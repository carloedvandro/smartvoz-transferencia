<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="m-purple" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8B22E6"/><stop offset="1" stop-color="#3D0072"/>
    </linearGradient>
    <linearGradient id="m-gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFE48A"/><stop offset=".55" stop-color="#F6C756"/><stop offset="1" stop-color="#A86800"/>
    </linearGradient>
    <filter id="m-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#21003F" flood-opacity=".35"/>
    </filter>
  </defs>
  <g filter="url(#m-sh)">
    <!-- back bills -->
    <rect x="14" y="42" width="100" height="48" rx="8" fill="#3D0072"/>
    <rect x="12" y="38" width="100" height="48" rx="8" fill="#5A0A95"/>
    <rect x="10" y="34" width="100" height="48" rx="8" fill="url(#m-purple)" stroke="#F6C756" stroke-width="1.5"/>
    <!-- inner frame -->
    <rect x="16" y="40" width="88" height="36" rx="4" fill="none" stroke="#F6C756" stroke-width="1.2" opacity=".55"/>
    <circle cx="22" cy="58" r="3.2" fill="none" stroke="#F6C756" stroke-width="1.4"/>
    <circle cx="98" cy="58" r="3.2" fill="none" stroke="#F6C756" stroke-width="1.4"/>
    <!-- gold band -->
    <rect x="48" y="28" width="24" height="60" rx="3" fill="url(#m-gold)" stroke="#7A4A00" stroke-width="1.2"/>
    <text x="60" y="63" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="22" fill="#3D0072" text-anchor="middle">$</text>
  </g>
</svg>
