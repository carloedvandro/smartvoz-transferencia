<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="n-p" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#B84CFF"/><stop offset="1" stop-color="#3D0072"/>
    </linearGradient>
    <linearGradient id="n-g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFE48A"/><stop offset="1" stop-color="#A86800"/>
    </linearGradient>
    <filter id="n-sh"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#21003F" flood-opacity=".35"/></filter>
  </defs>
  <g filter="url(#n-sh)">
    <!-- side people -->
    <g>
      <circle cx="30" cy="40" r="9" fill="url(#n-p)" stroke="#F6C756" stroke-width="1.5"/>
      <path d="M16 64 Q16 52 30 52 Q44 52 44 64 Z" fill="url(#n-p)" stroke="#F6C756" stroke-width="1.5"/>
    </g>
    <g>
      <circle cx="98" cy="40" r="9" fill="url(#n-p)" stroke="#F6C756" stroke-width="1.5"/>
      <path d="M84 64 Q84 52 98 52 Q112 52 112 64 Z" fill="url(#n-p)" stroke="#F6C756" stroke-width="1.5"/>
    </g>
    <!-- center person (gold) -->
    <circle cx="64" cy="32" r="11" fill="url(#n-g)" stroke="#7A4A00" stroke-width="1.5"/>
    <path d="M46 64 Q46 46 64 46 Q82 46 82 64 Z" fill="url(#n-g)" stroke="#7A4A00" stroke-width="1.5"/>
    <!-- hand -->
    <path d="M10 86 Q22 70 60 74 Q98 78 118 72 Q120 88 100 96 Q60 104 30 100 Q14 96 10 86 Z" fill="url(#n-p)" stroke="#F6C756" stroke-width="2"/>
    <path d="M14 92 Q22 100 40 102" fill="none" stroke="#FFF" stroke-width="1" opacity=".25"/>
    <!-- cuff -->
    <path d="M6 80 Q4 92 10 100 Q18 104 26 100 Q22 88 24 80 Z" fill="#F6C756" stroke="#7A4A00" stroke-width="1.4"/>
    <line x1="8" y1="92" x2="24" y2="92" stroke="#7A4A00" stroke-width="1"/>
  </g>
</svg>
