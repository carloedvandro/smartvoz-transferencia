<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="l-p" cx=".35" cy=".3" r=".9">
      <stop offset="0" stop-color="#B84CFF"/><stop offset="1" stop-color="#3D0072"/>
    </radialGradient>
    <linearGradient id="l-g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFE48A"/><stop offset="1" stop-color="#A86800"/>
    </linearGradient>
    <filter id="l-sh"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#21003F" flood-opacity=".35"/></filter>
  </defs>
  <g filter="url(#l-sh)">
    <!-- links -->
    <line x1="64" y1="22" x2="22" y2="64" stroke="url(#l-g)" stroke-width="4" stroke-linecap="round"/>
    <line x1="64" y1="22" x2="106" y2="64" stroke="url(#l-g)" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="64" x2="64" y2="106" stroke="url(#l-g)" stroke-width="4" stroke-linecap="round"/>
    <line x1="106" y1="64" x2="64" y2="106" stroke="url(#l-g)" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="64" x2="106" y2="64" stroke="url(#l-g)" stroke-width="3" opacity=".55"/>
    <!-- nodes -->
    <g stroke="#7A4A00" stroke-width="1.5">
      <circle cx="64" cy="22" r="14" fill="url(#l-p)"/>
      <circle cx="22" cy="64" r="14" fill="url(#l-p)"/>
      <circle cx="106" cy="64" r="14" fill="url(#l-p)"/>
      <circle cx="64" cy="106" r="14" fill="url(#l-p)"/>
    </g>
    <!-- inner gold dots -->
    <circle cx="64" cy="22" r="5" fill="url(#l-g)"/>
    <circle cx="22" cy="64" r="5" fill="url(#l-g)"/>
    <circle cx="106" cy="64" r="5" fill="url(#l-g)"/>
    <circle cx="64" cy="106" r="5" fill="url(#l-g)"/>
  </g>
</svg>
